<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f1a">
  <title>MahMahMia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100dvh;
      padding: 16px;
      font-size: 16px;
    }
    h1 { text-align: center; font-size: 24px; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 20px; }
    section { display: none; max-width: 420px; margin: 0 auto; }
    section.active { display: block; }
    .btn {
      display: block; width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px;
      min-height: 48px;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn-primary { background: #4a9eff; color: #fff; }
    .btn-success { background: #22c55e; color: #fff; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-ghost { background: none; color: #888; text-decoration: underline; border: none; font-size: 14px; cursor: pointer; padding: 8px; }
    input, select {
      width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px;
      background: #1a1a2e; color: #e0e0e0; font-size: 16px; margin-bottom: 8px;
      min-height: 48px;
    }
    select { appearance: none; }
    .label { font-size: 12px; text-transform: uppercase; color: #888; letter-spacing: 0.5px; margin-bottom: 6px; }
    .panel { background: #1a1a2e; border-radius: 10px; padding: 12px; margin-bottom: 16px; }
    .score-pos { color: #22c55e; }
    .score-neg { color: #ef4444; }
    .score-zero { color: #888; }
    .btn-toggle {
      flex: 1; padding: 12px; border: 1px solid #333; border-radius: 8px;
      background: #1a1a2e; color: #888; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, opacity 0.1s, background 0.15s, color 0.15s;
    }
    .btn-toggle.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
    .player-buttons { display: flex; gap: 6px; }
    .player-btn {
      flex: 1; padding: 10px 4px; border: 2px solid #333; border-radius: 10px;
      background: #1a1a2e; color: #e0e0e0; font-size: 14px; font-weight: 600;
      cursor: pointer; min-height: 44px; text-align: center;
      transition: transform 0.1s, background 0.15s, border-color 0.15s, color 0.15s;
    }
    .player-btn:active { transform: scale(0.95); }
    .player-btn.selected-loser { background: #7f1d1d; border-color: #ef4444; color: #fca5a5; }
    .player-btn.selected-winner { background: #14532d; border-color: #22c55e; color: #86efac; }
    .player-btn.disabled { opacity: 0.25; pointer-events: none; }
    .quick-amounts { display: flex; gap: 6px; margin-bottom: 10px; }
    .quick-amt {
      flex: 1; padding: 8px 4px; border: 1px solid #333; border-radius: 8px;
      background: #1a1a2e; color: #4a9eff; font-size: 14px; font-weight: 700;
      cursor: pointer; text-align: center; min-height: 38px;
      transition: transform 0.1s, background 0.15s;
    }
    .quick-amt:active { transform: scale(0.95); background: #253350; }
    .success-banner {
      background: #166534; color: #86efac; padding: 10px 14px; border-radius: 10px;
      font-size: 13px; font-weight: 600; margin-bottom: 12px; text-align: center;
      line-height: 1.4;
      transition: opacity 0.3s ease, max-height 0.3s ease;
      max-height: 80px; opacity: 1; overflow: hidden;
    }
    .success-banner.hidden { max-height: 0; opacity: 0; padding: 0 14px; margin-bottom: 0; }
    .success-banner .banner-detail { font-size: 12px; color: #6ee7a0; opacity: 0.8; }
    @keyframes pulse-panel {
      0% { border-color: #4a9eff; }
      100% { border-color: transparent; }
    }
    .standings-flash { animation: pulse-panel 0.8s ease-out; border-color: #4a9eff; border-width: 2px; border-style: solid; }
    .log-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; cursor: pointer; user-select: none;
    }
    .log-chevron { color: #888; font-size: 14px; transition: transform 0.2s; }
    .log-chevron.open { transform: rotate(90deg); }
    .log-collapsed { display: none; }
    .log-expanded { display: block; }
    .round-entry {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid #222; font-size: 14px;
    }
    .round-entry:last-child { border-bottom: none; }
    .delete-btn {
      background: none; border: none; color: #ef4444; cursor: pointer;
      font-size: 18px; padding: 4px 8px; min-height: 44px; min-width: 44px;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-toggle:active { transform: scale(0.97); opacity: 0.85; }
    .btn-ghost:active { opacity: 0.5; }
    .delete-btn:active { opacity: 0.5; }
    .player-title { font-size: 11px; opacity: 0.6; margin-left: 6px; }
    .standings-panel { border-top: 3px solid #4a9eff; }
    @keyframes flash-in {
      from { background: rgba(74, 158, 255, 0.2); }
      to { background: transparent; }
    }
    .round-entry.flash { animation: flash-in 0.6s ease-out; }
  </style>
</head>
<body>
  <h1>🀄 MahMahMia</h1>
  <p class="subtitle">Score Tracker</p>


  <section id="setup" class="active">
    <div class="label">Game Type</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="btn btn-toggle active" onclick="setGameType('mahjong')" id="btn-mahjong">Mahjong (3)</button>
      <button class="btn btn-toggle" onclick="setGameType('rummy')" id="btn-rummy">Rummy (4)</button>
    </div>
    <div id="name-inputs"></div>
    <div id="setup-error" style="color:#ef4444;font-size:14px;min-height:20px;margin-top:4px;"></div>
    <button class="btn btn-success" onclick="startGame()">Start Game →</button>
  </section>

  <section id="scoring">
    <button class="btn-ghost" onclick="backToSetup()">← Back to Setup</button>

    <div class="label">Standings</div>
    <div class="panel standings-panel" id="standings"></div>

    <div class="panel">
      <div style="margin-bottom:10px;">
        <div class="label">Who pays?</div>
        <div id="loser-buttons" class="player-buttons"></div>
      </div>
      <div style="margin-bottom:10px;">
        <div class="label">Who gets?</div>
        <div id="winner-buttons" class="player-buttons"></div>
      </div>
      <div id="quick-amounts" class="quick-amounts"></div>
      <div style="display:flex;gap:8px;align-items:end;">
        <div style="flex:1;">
          <div class="label">Points</div>
          <input type="number" id="points" inputmode="numeric" placeholder="" min="1" step="1" style="margin-bottom:0;" onkeydown="if(event.key==='Enter')addRound()">
        </div>
        <button class="btn btn-primary" onclick="addRound()" style="width:auto;padding:14px 24px;margin-top:0;">+ Add</button>
      </div>
      <div id="scoring-error" style="color:#ef4444;font-size:14px;min-height:20px;margin-top:4px;"></div>
    </div>
    <div id="success-banner" class="success-banner hidden"></div>

    <div class="log-header" onclick="toggleLog()">
      <span class="label" style="margin-bottom:0;" id="log-label">Log (0)</span>
      <span class="log-chevron" id="log-chevron">▸</span>
    </div>
    <div class="panel log-collapsed" id="round-log"></div>

    <button class="btn-ghost" onclick="endGame()" style="display:block;width:100%;text-align:center;margin-top:16px;color:#ef4444;">End Game — Settle Up</button>
  </section>

  <section id="settlement">
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:20px;font-weight:bold;">Game Over!</div>
      <div id="settlement-flavor" style="color:#fbbf24;font-size:14px;margin-top:6px;"></div>
    </div>

    <div class="label">Final Scores</div>
    <div class="panel standings-panel" id="final-scores"></div>

    <div class="label">Who Pays Who</div>
    <div class="panel" id="transfers"></div>

    <button class="btn btn-primary" onclick="backToScoring()">← Back to Scoring</button>
    <button class="btn btn-danger" onclick="newGame()">New Game</button>
  </section>

  <script>
    // --- Screen switching ---
    function showScreen(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // --- XSS escape helper ---
    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    // --- Sound effects (Web Audio API, no files needed) ---
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playTone(freq, duration, type, delay) {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + duration);
    }

    function soundCoin() {
      // Quick ascending "cha-ching"
      playTone(880, 0.1, 'square', 0);
      playTone(1175, 0.1, 'square', 0.08);
      playTone(1397, 0.15, 'square', 0.16);
    }

    function soundSettle() {
      // Celebration fanfare
      playTone(523, 0.15, 'square', 0);
      playTone(659, 0.15, 'square', 0.15);
      playTone(784, 0.15, 'square', 0.3);
      playTone(1047, 0.3, 'square', 0.45);
    }

    function soundDelete() {
      // Quick descending boop
      playTone(400, 0.1, 'sine', 0);
      playTone(250, 0.15, 'sine', 0.08);
    }

    // --- Toast ---
    const toastMsgs = [
      (l, w, p) => `${l} 又送钱给 ${w} 了`,
      (l, w, p) => `${w} 发财啦！`,
      (l, w, p) => `${l} 的钱包在哭`,
      (l, w, p) => `${l} 又输了！`,
      (l, w, p) => `${l} 慷慨解囊`,
      (l, w, p) => `${w} 笑到合不拢嘴`,
      (l, w, p) => `${l} 破财消灾`,
      (l, w, p) => `${w} 财源滚滚`,
    ];
    function funToast(loser, winner, pts) {
      const fn = toastMsgs[Math.floor(Math.random() * toastMsgs.length)];
      return fn(loser, winner, pts);
    }

    let toastTimer = null;
    function showToast(funMsg, detail) {
      const el = document.getElementById('success-banner');
      el.innerHTML = `${esc(funMsg)}<div class="banner-detail">${esc(detail)}</div>`;
      el.classList.remove('hidden');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.add('hidden'), 2500);
    }

    function flashStandings() {
      const panel = document.getElementById('standings');
      panel.classList.remove('standings-flash');
      void panel.offsetWidth; // force reflow
      panel.classList.add('standings-flash');
      setTimeout(() => panel.classList.remove('standings-flash'), 800);
    }

    // --- Persistence ---
    function saveState() {
      const state = { gameType, playerCount, players, rounds };
      sessionStorage.setItem('mahmahmia-state', JSON.stringify(state));
    }

    function clearState() {
      sessionStorage.removeItem('mahmahmia-state');
    }

    function restoreState() {
      const saved = sessionStorage.getItem('mahmahmia-state');
      if (!saved) return false;
      try {
        const state = JSON.parse(saved);
        if (!Array.isArray(state.players) || !Array.isArray(state.rounds)) throw new Error('invalid');
        gameType = state.gameType;
        playerCount = state.playerCount;
        players = state.players;
        rounds = state.rounds;
        return true;
      } catch (e) {
        clearState();
        return false;
      }
    }

    // --- Scoring ---
    function renderScoring() {
      document.getElementById('scoring-error').textContent = '';
      renderStandings();
      renderPlayerButtons();
      renderQuickAmounts();
      renderRoundLog();
    }

    function getNetScores() {
      const scores = {};
      players.forEach(p => scores[p] = 0);
      rounds.forEach(r => {
        scores[r.loser] -= r.points;
        scores[r.winner] += r.points;
      });
      return scores;
    }

    function getTitle(score, isTop, isBottom) {
      if (score === 0) return '打酱油';
      if (isTop && score > 0) return '大老板';
      if (isBottom && score < 0) return '破产王';
      if (score > 0) return '小赚';
      return '惨了';
    }

    function renderScorePanel(elementId, showTitles) {
      const scores = getNetScores();
      const sorted = players.slice().sort((a, b) => scores[b] - scores[a]);
      const top = sorted[0], bottom = sorted[sorted.length - 1];
      document.getElementById(elementId).innerHTML = sorted.map(p => {
        const s = scores[p];
        const cls = s > 0 ? 'score-pos' : s < 0 ? 'score-neg' : 'score-zero';
        const prefix = s > 0 ? '+' : '';
        const title = showTitles && rounds.length > 0
          ? `<span class="player-title">${getTitle(s, p === top, p === bottom)}</span>` : '';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;" class="${cls}">
      <span>${esc(p)}${title}</span><span>${prefix}${s}</span>
    </div>`;
      }).join('');
    }

    function renderStandings() { renderScorePanel('standings', true); }

    let selectedLoser = null;
    let selectedWinner = null;

    function renderPlayerButtons() {
      const loserContainer = document.getElementById('loser-buttons');
      const winnerContainer = document.getElementById('winner-buttons');

      loserContainer.innerHTML = players.map(p => {
        const sel = p === selectedLoser ? ' selected-loser' : '';
        return `<button class="player-btn${sel}" onclick="selectLoser('${esc(p)}')">${esc(p)}</button>`;
      }).join('');

      winnerContainer.innerHTML = players.map(p => {
        const dis = p === selectedLoser ? ' disabled' : '';
        const sel = p === selectedWinner ? ' selected-winner' : '';
        return `<button class="player-btn${sel}${dis}" onclick="selectWinner('${esc(p)}')">${esc(p)}</button>`;
      }).join('');
    }

    function selectLoser(name) {
      selectedLoser = name;
      if (selectedWinner === name) selectedWinner = null;
      renderPlayerButtons();
    }

    function selectWinner(name) {
      if (name === selectedLoser) return;
      selectedWinner = name;
      renderPlayerButtons();
      document.getElementById('points').focus();
    }

    function getRecentAmounts() {
      // Get unique amounts from recent rounds, most recent first, max 4
      const seen = new Set();
      const amounts = [];
      for (let i = rounds.length - 1; i >= 0 && amounts.length < 4; i--) {
        const pts = rounds[i].points;
        if (!seen.has(pts)) {
          seen.add(pts);
          amounts.push(pts);
        }
      }
      return amounts.sort((a, b) => a - b);
    }

    function renderQuickAmounts() {
      const container = document.getElementById('quick-amounts');
      const amounts = getRecentAmounts();
      if (amounts.length === 0) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = '<div class="label">Quick</div>' +
        amounts.map(a =>
          `<button class="quick-amt" onclick="quickAdd(${a})">${a}</button>`
        ).join('');
    }

    function quickAdd(pts) {
      const pointsInput = document.getElementById('points');
      pointsInput.value = pts;
      pointsInput.focus();
    }

    function addRound() {
      const pointsInput = document.getElementById('points');
      if (!selectedLoser || !selectedWinner) {
        document.getElementById('scoring-error').textContent = 'Select who pays and who gets.';
        return;
      }
      const points = parseInt(pointsInput.value, 10);
      if (!points || points <= 0 || points !== Number(pointsInput.value)) {
        document.getElementById('scoring-error').textContent = 'Enter a valid point amount.';
        return;
      }
      document.getElementById('scoring-error').textContent = '';
      rounds.push({ loser: selectedLoser, winner: selectedWinner, points });
      pointsInput.value = '';
      pointsInput.blur();
      showToast(funToast(selectedLoser, selectedWinner, points), `${selectedLoser} → ${selectedWinner}: ${points} pts`);
      soundCoin();
      // Keep loser/winner selected for quick consecutive entries
      renderStandings();
      flashStandings();
      renderRoundLog();
      renderQuickAmounts();
      const entries = document.querySelectorAll('.round-entry');
      if (entries.length > 0) {
        entries[0].classList.add('flash');
        setTimeout(() => entries[0].classList.remove('flash'), 600);
      }
      saveState();
    }

    let logOpen = false;

    function toggleLog() {
      logOpen = !logOpen;
      const container = document.getElementById('round-log');
      const chevron = document.getElementById('log-chevron');
      container.className = logOpen ? 'panel log-expanded' : 'panel log-collapsed';
      chevron.className = logOpen ? 'log-chevron open' : 'log-chevron';
    }

    function renderRoundLog() {
      const container = document.getElementById('round-log');
      document.getElementById('log-label').textContent = `Log (${rounds.length})`;
      if (rounds.length === 0) {
        container.innerHTML = '<div style="color:#666;font-size:14px;padding:4px 0;">No entries yet</div>';
        return;
      }
      container.innerHTML = rounds.slice().reverse().map((r, i) => {
        const num = rounds.length - i;
        return `<div class="round-entry">
          <span>#${num}: ${esc(r.loser)} → ${esc(r.winner)}: ${r.points} pts</span>
          <button class="delete-btn" onclick="deleteRound(${rounds.length - 1 - i})" title="Delete">✕</button>
        </div>`;
      }).join('');
    }

    function deleteRound(index) {
      rounds.splice(index, 1);
      soundDelete();
      renderStandings();
      renderRoundLog();
      renderQuickAmounts();
      saveState();
    }

    // --- Navigation ---
    function backToSetup() {
      if (rounds.length > 0 && !confirm('Go back to setup? All rounds will be lost.')) return;
      rounds = [];
      clearState();
      document.getElementById('btn-mahjong').classList.toggle('active', gameType === 'mahjong');
      document.getElementById('btn-rummy').classList.toggle('active', gameType === 'rummy');
      renderNameInputs();
      showScreen('setup');
    }

    function endGame() {
      if (!confirm('End the game and settle up?')) return;
      renderSettlement();
      showScreen('settlement');
      soundSettle();
    }

    function calculateSettlement(netScores) {
      // Invariant: net scores must sum to zero
      const sum = Object.values(netScores).reduce((a, b) => a + b, 0);
      if (sum !== 0) throw new Error(`Net scores do not sum to zero (sum=${sum})`);
      const debtors = [];
      const creditors = [];
      for (const [name, amount] of Object.entries(netScores)) {
        if (amount < 0) debtors.push({ name, amount: Math.abs(amount) });
        else if (amount > 0) creditors.push({ name, amount });
      }
      debtors.sort((a, b) => b.amount - a.amount);
      creditors.sort((a, b) => b.amount - a.amount);
      const transfers = [];
      let d = 0, c = 0;
      while (d < debtors.length && c < creditors.length) {
        const transfer = Math.min(debtors[d].amount, creditors[c].amount);
        transfers.push({ from: debtors[d].name, to: creditors[c].name, amount: transfer });
        debtors[d].amount -= transfer;
        creditors[c].amount -= transfer;
        if (debtors[d].amount === 0) d++;
        if (creditors[c].amount === 0) c++;
      }
      return transfers;
    }

    function renderSettlement() {
      const scores = getNetScores();
      const sorted = players.slice().sort((a, b) => scores[b] - scores[a]);
      const topPlayer = sorted[0];
      const bottomPlayer = sorted[sorted.length - 1];

      // Settlement flavor text
      const flavorEl = document.getElementById('settlement-flavor');
      const transfers = calculateSettlement(scores);
      if (transfers.length === 0) {
        flavorEl.textContent = '打平了...再来一局！';
      } else {
        const flavors = [
          `${topPlayer} 今晚请客！`,
          `${bottomPlayer}，快还钱！别装没看到`,
          `${topPlayer} 赢麻了，${bottomPlayer} 输惨了`,
          `${bottomPlayer} 的钱包已阵亡`,
        ];
        flavorEl.textContent = flavors[Math.floor(Math.random() * flavors.length)];
      }

      // Final scores
      renderScorePanel('final-scores', false);

      // Transfers
      const container = document.getElementById('transfers');
      if (transfers.length === 0) {
        container.innerHTML = '<div style="color:#22c55e;text-align:center;padding:8px;">大家打平了！</div>';
      } else {
        container.innerHTML = transfers.map(t =>
          `<div style="display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid #222;">
            <span class="score-neg" style="font-weight:600;font-size:16px;">${esc(t.from)}</span>
            <span style="color:#888;">→</span>
            <span class="score-pos" style="font-weight:600;font-size:16px;">${esc(t.to)}</span>
            <span style="margin-left:auto;font-weight:800;font-size:18px;color:#fff;">${t.amount} pts</span>
          </div>`
        ).join('');
      }
    }

    function backToScoring() {
      showScreen('scoring');
    }

    function newGame() {
      players = [];
      rounds = [];
      gameType = 'mahjong';
      playerCount = 3;
      clearState();
      document.getElementById('btn-mahjong').classList.toggle('active', true);
      document.getElementById('btn-rummy').classList.toggle('active', false);
      renderNameInputs();
      showScreen('setup');
    }

    // --- State ---
    let gameType = 'mahjong';
    let playerCount = 3;
    let players = [];
    let rounds = [];

    // --- Setup ---
    function setGameType(type) {
      gameType = type;
      playerCount = type === 'mahjong' ? 3 : 4;
      document.getElementById('btn-mahjong').classList.toggle('active', type === 'mahjong');
      document.getElementById('btn-rummy').classList.toggle('active', type === 'rummy');
      renderNameInputs();
    }

    function renderNameInputs() {
      const container = document.getElementById('name-inputs');
      container.innerHTML = '';
      for (let i = 0; i < playerCount; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `Player ${i + 1} name`;
        input.id = `name-${i}`;
        input.autocomplete = 'off';
        if (i === playerCount - 1) {
          input.addEventListener('keydown', e => { if (e.key === 'Enter') startGame(); });
        } else {
          input.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); document.getElementById(`name-${i + 1}`).focus(); }
          });
        }
        container.appendChild(input);
      }
      document.getElementById('name-0').focus();
    }

    function startGame() {
      const names = [];
      for (let i = 0; i < playerCount; i++) {
        const name = document.getElementById(`name-${i}`).value.trim();
        names.push(name);
      }
      // Validate: non-empty
      if (names.some(n => n === '')) {
        document.getElementById('setup-error').textContent = 'All names are required.';
        return;
      }
      // Validate: no duplicates
      if (new Set(names).size !== names.length) {
        document.getElementById('setup-error').textContent = 'Names must be unique.';
        return;
      }
      document.getElementById('setup-error').textContent = '';
      players = names;
      rounds = [];
      renderScoring();
      showScreen('scoring');
      saveState();
    }

    // Initialize
    if (restoreState() && players.length > 0) {
      renderScoring();
      showScreen('scoring');
    } else {
      renderNameInputs();
    }
  </script>
</body>
</html>
